<!doctype html>
<html lang="en" style="width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Election Rounds Tracker</title>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      
      #error-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: red;
        color: white;
        padding: 20px;
        font-family: monospace;
        overflow: auto;
        display: none;
        z-index: 9999;
      }

      /* Loading Animations */
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes slideInDown {
        from {
          transform: translateY(-30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes progressBar {
        0% {
          width: 0%;
        }
        50% {
          width: 70%;
        }
        100% {
          width: 100%;
        }
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      @keyframes glow {
        0%, 100% {
          box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
        }
      }

      .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #ffffff;
        border-radius: 50%;
        animation: spin 1.5s linear infinite;
        margin: 0 auto 30px;
      }

      .loading-container {
        animation: float 3s ease-in-out infinite;
      }

      .progress-bar {
        width: 250px;
        height: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        margin: 30px auto 0;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #00d4ff, #0099ff, #ff00ff);
        border-radius: 10px;
        animation: progressBar 2.5s ease-in-out infinite;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
      }

      .status-text {
        margin-top: 20px;
        font-size: 13px;
        opacity: 0.8;
        animation: slideInDown 0.8s ease-out;
        letter-spacing: 1px;
      }

      .dot-animation {
        display: inline-block;
      }

      .dot-animation::after {
        content: '';
        animation: pulse 1.5s infinite;
      }

      .loading-title {
        font-size: 28px;
        font-weight: 300;
        margin-bottom: 10px;
        letter-spacing: 2px;
        animation: slideInDown 0.6s ease-out;
      }

      .loading-subtitle {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 35px;
        animation: slideInDown 1s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f4c75 0%, #2a6fa6 50%, #00a86b 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white;">
        <div class="loading-container" style="text-align: center;">
          <div class="loading-title">Election Dashboard</div>
          <div class="spinner"></div>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <p class="status-text">
            <span id="loading-status">Initializing</span><span class="dot-animation">...</span>
          </p>
          <p class="loading-subtitle">If this message persists, there may be an error. Check the console for details.</p>
        </div>
      </div>
    </div>
    <div id="error-container">
      <h1>Error Loading Application</h1>
      <p id="error-message" style="margin-top: 20px; white-space: pre-wrap;"></p>
    </div>
    
    <script>
      // Loading status animation
      const statuses = [
        'Initializing',
        'Loading modules',
        'Connecting to server',
        'Retrieving data',
        'Preparing interface'
      ];
      let statusIndex = 0;

      setInterval(() => {
        const statusEl = document.getElementById('loading-status');
        if (statusEl) {
          statusIndex = (statusIndex + 1) % statuses.length;
          statusEl.textContent = statuses[statusIndex];
        }
      }, 2000);

      // Global error handler
      window.addEventListener('error', function(event) {
        // Ignore transient React errors during navigation/logout
        if (event.message && (event.message.includes('Minified React error') || event.message.includes('concurrent rendering'))) {
          console.warn('Transient React error suppressed:', event.message);
          event.preventDefault();
          return;
        }
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        errorContainer.style.display = 'block';
        errorMessage.textContent = `ERROR: ${event.message}\n\nFile: ${event.filename}\nLine: ${event.lineno}:${event.colno}\n\nStack: ${event.error?.stack || 'N/A'}`;
        console.error('Global error:', event);
      });
      
      // Unhandled promise rejection handler
      window.addEventListener('unhandledrejection', function(event) {
        // Ignore transient React/auth errors during navigation/logout
        const reason = String(event.reason || '');
        if (reason.includes('Minified React error') || reason.includes('AuthSessionMissingError') || reason.includes('concurrent rendering')) {
          console.warn('Transient rejection suppressed:', reason);
          event.preventDefault();
          return;
        }
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        errorContainer.style.display = 'block';
        errorMessage.textContent = `UNHANDLED PROMISE REJECTION: ${event.reason}\n\nStack: ${event.reason?.stack || 'N/A'}`;
        console.error('Unhandled rejection:', event);
      });
      
      console.log('Error handlers initialized');
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
